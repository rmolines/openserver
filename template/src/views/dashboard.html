<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenServer Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #d4d4d4;
      --muted: #666;
      --accent: #4a9eff;
      --green: #4caf50;
      --yellow: #ffc107;
      --red: #f44336;
      --blue: #2196f3;
      --font: 'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    header .subtitle {
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 53px);
    }

    .panel {
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }

    .panel-header h2 {
      font-size: 12px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .count {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .filters {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font);
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.1s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(74, 158, 255, 0.08);
    }

    .project-list {
      padding: 8px 0;
    }

    .project-card {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .project-card:hover {
      background: var(--surface);
    }

    .project-card.selected {
      background: rgba(74, 158, 255, 0.06);
      border-left: 2px solid var(--accent);
      padding-left: 14px;
    }

    .project-card .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .project-card .title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .project-card .description {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      font-size: 10px;
      padding: 1px 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
    }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-active    { background: rgba(76, 175, 80, 0.15); color: var(--green); border: 1px solid rgba(76, 175, 80, 0.3); }
    .badge-inactive  { background: rgba(102, 102, 102, 0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-planning  { background: rgba(255, 193, 7, 0.12); color: var(--yellow); border: 1px solid rgba(255, 193, 7, 0.3); }
    .badge-archived  { background: rgba(244, 67, 54, 0.1); color: var(--red); border: 1px solid rgba(244, 67, 54, 0.25); }
    .badge-todo      { background: rgba(102, 102, 102, 0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-in-progress { background: rgba(33, 150, 243, 0.12); color: var(--blue); border: 1px solid rgba(33, 150, 243, 0.3); }
    .badge-done      { background: rgba(76, 175, 80, 0.15); color: var(--green); border: 1px solid rgba(76, 175, 80, 0.3); }
    .badge-blocked   { background: rgba(244, 67, 54, 0.1); color: var(--red); border: 1px solid rgba(244, 67, 54, 0.25); }

    .priority {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .priority-high   { color: var(--red); }
    .priority-medium { color: var(--yellow); }
    .priority-low    { color: var(--muted); }

    .detail-panel {
      overflow-y: auto;
      padding: 0;
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-content {
      padding: 0;
    }

    .detail-project-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .detail-project-header .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .detail-project-header h2 {
      font-size: 15px;
      font-weight: normal;
    }

    .detail-project-header .desc {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .detail-tasks-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }

    .detail-tasks-header h3 {
      font-size: 11px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .task-list {
      padding: 0;
    }

    .task-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .task-item:hover {
      background: var(--surface);
    }

    .task-item .task-title {
      font-size: 13px;
      margin-bottom: 3px;
    }

    .task-item .task-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .task-item .task-assignee {
      color: var(--muted);
      font-size: 11px;
    }

    .task-item .task-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .loading {
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
    }

    .error {
      padding: 12px 16px;
      color: var(--red);
      font-size: 12px;
      border: 1px solid rgba(244, 67, 54, 0.2);
      background: rgba(244, 67, 54, 0.05);
      margin: 8px 16px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>OpenServer</h1>
  <span class="subtitle">// dashboard</span>
</header>

<div class="layout">
  <div class="panel" id="projects-panel">
    <div class="panel-header">
      <h2>Projects</h2>
      <span class="count" id="project-count">—</span>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-status="">all</button>
      <button class="filter-btn" data-status="active">active</button>
      <button class="filter-btn" data-status="planning">planning</button>
      <button class="filter-btn" data-status="inactive">inactive</button>
      <button class="filter-btn" data-status="archived">archived</button>
    </div>
    <div class="project-list" id="project-list">
      <div class="loading">loading projects...</div>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">← select a project to view tasks</div>
    <div class="detail-content" id="detail-content" style="display:none;"></div>
  </div>
</div>

<script>
  let selectedSlug = null;
  let activeStatus = '';

  function badgeClass(status) {
    const s = (status || '').toLowerCase().replace(/\s+/g, '-');
    return 'badge badge-' + (s || 'inactive');
  }

  function priorityClass(priority) {
    const p = (priority || '').toLowerCase();
    return 'priority priority-' + (p || 'low');
  }

  function renderTags(tags) {
    if (!tags) return '';
    const list = Array.isArray(tags) ? tags : String(tags).split(',').map(t => t.trim()).filter(Boolean);
    return list.map(t => `<span class="tag">${esc(t)}</span>`).join('');
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadProjects(status) {
    const list = document.getElementById('project-list');
    list.innerHTML = '<div class="loading">loading...</div>';

    const url = status ? `/api/projects?status=${encodeURIComponent(status)}` : '/api/projects';
    let data;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (e) {
      list.innerHTML = `<div class="error">failed to load projects: ${esc(e.message)}</div>`;
      return;
    }

    const items = data.data || [];
    document.getElementById('project-count').textContent = items.length;

    if (items.length === 0) {
      list.innerHTML = '<div class="empty">no projects found</div>';
      return;
    }

    list.innerHTML = items.map(item => {
      const f = item.fields || {};
      const selected = item.slug === selectedSlug ? ' selected' : '';
      return `
        <div class="project-card${selected}" data-slug="${esc(item.slug)}" onclick="selectProject('${esc(item.slug)}')">
          <div class="card-top">
            <span class="title">${esc(f.title || item.slug)}</span>
            <span class="${badgeClass(f.status)}">${esc(f.status || '—')}</span>
          </div>
          ${f.description ? `<div class="description">${esc(f.description)}</div>` : ''}
          ${f.tags ? `<div class="tags">${renderTags(f.tags)}</div>` : ''}
        </div>`;
    }).join('');
  }

  async function selectProject(slug) {
    selectedSlug = slug;

    // update selection highlight
    document.querySelectorAll('.project-card').forEach(el => {
      el.classList.toggle('selected', el.dataset.slug === slug);
    });

    const empty = document.getElementById('detail-empty');
    const content = document.getElementById('detail-content');
    empty.style.display = 'none';
    content.style.display = 'block';
    content.innerHTML = '<div class="loading" style="padding:20px;">loading tasks...</div>';

    let projectData, tasksData;
    try {
      const [pRes, tRes] = await Promise.all([
        fetch(`/api/projects/${encodeURIComponent(slug)}`),
        fetch(`/api/projects/${encodeURIComponent(slug)}/tasks`)
      ]);
      if (!pRes.ok) throw new Error(`project HTTP ${pRes.status}`);
      if (!tRes.ok) throw new Error(`tasks HTTP ${tRes.status}`);
      projectData = await pRes.json();
      tasksData = await tRes.json();
    } catch (e) {
      content.innerHTML = `<div class="error">failed to load data: ${esc(e.message)}</div>`;
      return;
    }

    const pf = projectData.fields || {};
    const tasks = tasksData.data || [];

    const tasksHtml = tasks.length === 0
      ? '<div class="empty">no tasks for this project</div>'
      : tasks.map(task => {
          const tf = task.fields || {};
          return `
            <div class="task-item">
              <div>
                <div class="task-title">${esc(tf.title || task.slug)}</div>
                <div class="task-meta">
                  ${tf.priority ? `<span class="${priorityClass(tf.priority)}">${esc(tf.priority)}</span>` : ''}
                  ${tf.assignee ? `<span class="task-assignee">${esc(tf.assignee)}</span>` : ''}
                </div>
              </div>
              <div class="task-right">
                <span class="${badgeClass(tf.status)}">${esc(tf.status || '—')}</span>
              </div>
            </div>`;
        }).join('');

    content.innerHTML = `
      <div class="detail-project-header">
        <div class="top">
          <h2>${esc(pf.title || slug)}</h2>
          <span class="${badgeClass(pf.status)}">${esc(pf.status || '—')}</span>
        </div>
        ${pf.description ? `<div class="desc">${esc(pf.description)}</div>` : ''}
        ${pf.tags ? `<div class="tags">${renderTags(pf.tags)}</div>` : ''}
      </div>
      <div class="detail-tasks-header">
        <h3>Tasks</h3>
        <span class="count">${tasks.length}</span>
      </div>
      <div class="task-list">${tasksHtml}</div>`;
  }

  // Filter buttons
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    selectedSlug = null;
    document.getElementById('detail-empty').style.display = '';
    document.getElementById('detail-content').style.display = 'none';
    loadProjects(activeStatus);
  });

  // Initial load
  loadProjects('');
</script>
</body>
</html>
